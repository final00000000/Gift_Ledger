name: Publish Updates

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 发布通道
        required: true
        type: choice
        options:
          - stable
          - beta
        default: stable
      release_tag:
        description: 可选，自定义 Release Tag（beta 发布必须填写，如 v1.3.1-beta.1）
        required: false
        type: string
      release_notes:
        description: 可选，本次版本说明（用于 Release 与 manifest notes）
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  android:
    name: Build Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python tool/resolve_release_metadata.py \
            --pubspec pubspec.yaml \
            --event-name "${EVENT_NAME}" \
            --input-channel "${INPUT_CHANNEL}" \
            --input-release-tag "${INPUT_RELEASE_TAG}" \
            --ref-name "${REF_NAME}" \
            --platform android \
            --github-output "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android split APKs
        run: |
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform android-arm,android-arm64 \
            --build-name "${{ steps.meta.outputs.semver }}" \
            --build-number "${{ steps.meta.outputs.build_number }}"

      - name: Prepare Android assets
        id: asset
        shell: bash
        env:
          ARMV7_NAME: ${{ steps.meta.outputs.asset_name_armeabi_v7a }}
          ARM64_NAME: ${{ steps.meta.outputs.asset_name_arm64_v8a }}
        run: |
          set -euo pipefail
          mkdir -p build/release-assets build/release-metadata

          armv7_source="build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk"
          arm64_source="build/app/outputs/flutter-apk/app-arm64-v8a-release.apk"

          armv7_asset_path="build/release-assets/${ARMV7_NAME}"
          arm64_asset_path="build/release-assets/${ARM64_NAME}"

          cp "$armv7_source" "$armv7_asset_path"
          cp "$arm64_source" "$arm64_asset_path"

          armv7_sha256="$(sha256sum "$armv7_asset_path" | awk '{print $1}')"
          arm64_sha256="$(sha256sum "$arm64_asset_path" | awk '{print $1}')"

          {
            echo "armv7_asset_path=$armv7_asset_path"
            echo "arm64_asset_path=$arm64_asset_path"
            echo "armv7_sha256=$armv7_sha256"
            echo "arm64_sha256=$arm64_sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure Release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
            exit 0
          fi

          args=(release create "$RELEASE_TAG" --title "Gift Ledger ${RELEASE_TAG}")
          if [ "$CHANNEL" = "beta" ]; then
            args+=(--prerelease)
          fi

          notes="${RELEASE_NOTES:-}"
          if [ -z "$notes" ]; then
            notes="Gift Ledger ${CHANNEL} ${RELEASE_TAG}"
          fi
          args+=(--notes "$notes")

          gh "${args[@]}" || gh release view "$RELEASE_TAG"

      - name: Upload Android assets to Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ARMV7_ASSET_NAME: ${{ steps.meta.outputs.asset_name_armeabi_v7a }}
          ARM64_ASSET_NAME: ${{ steps.meta.outputs.asset_name_arm64_v8a }}
          ARMV7_ASSET_PATH: ${{ steps.asset.outputs.armv7_asset_path }}
          ARM64_ASSET_PATH: ${{ steps.asset.outputs.arm64_asset_path }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" "$ARMV7_ASSET_PATH#$ARMV7_ASSET_NAME" --clobber
          gh release upload "$RELEASE_TAG" "$ARM64_ASSET_PATH#$ARM64_ASSET_NAME" --clobber

      - name: Write Android metadata
        shell: bash
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
          VERSION: ${{ steps.meta.outputs.semver }}
          BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ARMV7_ASSET_NAME: ${{ steps.meta.outputs.asset_name_armeabi_v7a }}
          ARM64_ASSET_NAME: ${{ steps.meta.outputs.asset_name_arm64_v8a }}
          ARMV7_SHA256: ${{ steps.asset.outputs.armv7_sha256 }}
          ARM64_SHA256: ${{ steps.asset.outputs.arm64_sha256 }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib

          notes = (os.environ.get('RELEASE_NOTES') or '').strip()
          if not notes:
              notes = f"Android {os.environ['CHANNEL']} {os.environ['VERSION']}"

          base_download_url = (
              f"https://github.com/{os.environ['REPOSITORY']}/releases/download/"
              f"{os.environ['RELEASE_TAG']}"
          )
          metadata = {
              'channel': os.environ['CHANNEL'],
              'platform': 'android',
              'version': os.environ['VERSION'],
              'buildNumber': int(os.environ['BUILD_NUMBER']),
              'packageType': 'apk',
              # 顶层入口固定指向 arm64-v8a，split 变体通过 variants 暴露。
              'downloadUrl': f"{base_download_url}/{os.environ['ARM64_ASSET_NAME']}",
              'sha256': os.environ['ARM64_SHA256'],
              'notes': notes,
              'variants': {
                  'armeabi-v7a': {
                      'packageType': 'apk',
                      'downloadUrl': f"{base_download_url}/{os.environ['ARMV7_ASSET_NAME']}",
                      'sha256': os.environ['ARMV7_SHA256'],
                  },
                  'arm64-v8a': {
                      'packageType': 'apk',
                      'downloadUrl': f"{base_download_url}/{os.environ['ARM64_ASSET_NAME']}",
                      'sha256': os.environ['ARM64_SHA256'],
                  },
              },
          }

          path = pathlib.Path('build/release-metadata/android.json')
          path.write_text(
              json.dumps(metadata, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload Android metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-android
          path: build/release-metadata/android.json
          if-no-files-found: error

  windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_RELEASE_TAG: ${{ github.event.inputs.release_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          python tool/resolve_release_metadata.py `
            --pubspec pubspec.yaml `
            --event-name "$env:EVENT_NAME" `
            --input-channel "$env:INPUT_CHANNEL" `
            --input-release-tag "$env:INPUT_RELEASE_TAG" `
            --ref-name "$env:REF_NAME" `
            --platform windows `
            --github-output "$env:GITHUB_OUTPUT"

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release `
            --build-name "${{ steps.meta.outputs.semver }}" `
            --build-number "${{ steps.meta.outputs.build_number }}"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        id: asset
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.meta.outputs.semver }}
          APP_BUILD: ${{ steps.meta.outputs.build_number }}
          APP_CHANNEL: ${{ steps.meta.outputs.channel }}
          OUTPUT_BASE_NAME: ${{ steps.meta.outputs.asset_base_name }}
        run: |
          $sourceDir = (Resolve-Path "build/windows/x64/runner/Release").Path
          $outputDir = Join-Path $env:GITHUB_WORKSPACE "build/windows/installer"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/DAppVersion=$env:APP_VERSION" `
            "/DAppBuild=$env:APP_BUILD" `
            "/DAppChannel=$env:APP_CHANNEL" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DOutputBaseName=$env:OUTPUT_BASE_NAME" `
            "windows/installer/GiftLedger.iss"

          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup 编译失败，退出码：$LASTEXITCODE"
          }

          $assetPath = Join-Path $outputDir "$env:OUTPUT_BASE_NAME.exe"
          if (-not (Test-Path $assetPath)) {
            throw "未生成 Windows 安装器：$assetPath"
          }
          $hash = (Get-FileHash -Path $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()

          Add-Content -Path $env:GITHUB_OUTPUT -Value "asset_path=$assetPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sha256=$hash"

      - name: Ensure Release exists
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $env:RELEASE_TAG already exists"
            exit 0
          }

          $args = @('release', 'create', $env:RELEASE_TAG, '--title', "Gift Ledger $env:RELEASE_TAG")
          if ($env:CHANNEL -eq 'beta') {
            $args += '--prerelease'
          }

          $notes = $env:RELEASE_NOTES
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Gift Ledger $($env:CHANNEL) $($env:RELEASE_TAG)"
          }
          $args += @('--notes', $notes)

          gh @args
          if ($LASTEXITCODE -ne 0) {
            gh release view $env:RELEASE_TAG
          }

      - name: Upload Windows asset to Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
        run: |
          gh release upload $env:RELEASE_TAG "$env:ASSET_PATH#$env:ASSET_NAME" --clobber

      - name: Write Windows metadata
        shell: pwsh
        env:
          CHANNEL: ${{ steps.meta.outputs.channel }}
          VERSION: ${{ steps.meta.outputs.semver }}
          BUILD_NUMBER: ${{ steps.meta.outputs.build_number }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          ASSET_NAME: ${{ steps.meta.outputs.asset_name }}
          SHA256: ${{ steps.asset.outputs.sha256 }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $notes = $env:RELEASE_NOTES
          if ([string]::IsNullOrWhiteSpace($notes)) {
            $notes = "Windows $($env:CHANNEL) $($env:VERSION)"
          }

          $metadata = [ordered]@{
            channel = $env:CHANNEL
            platform = 'windows'
            version = $env:VERSION
            buildNumber = [int]$env:BUILD_NUMBER
            packageType = 'exe'
            downloadUrl = "https://github.com/$($env:REPOSITORY)/releases/download/$($env:RELEASE_TAG)/$($env:ASSET_NAME)"
            sha256 = $env:SHA256
            notes = $notes
          }

          $path = Join-Path $env:GITHUB_WORKSPACE 'build/release-metadata/windows.json'
          New-Item -ItemType Directory -Force -Path (Split-Path $path) | Out-Null
          $metadata | ConvertTo-Json -Depth 4 | Set-Content -Path $path -Encoding UTF8

      - name: Upload Windows metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-windows
          path: build/release-metadata/windows.json
          if-no-files-found: error

  manifest:
    name: Publish Update Manifest
    runs-on: ubuntu-latest
    needs:
      - android
      - windows

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download release metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-metadata-*
          path: build/release-metadata
          merge-multiple: true

      - name: Merge release matrix input
        run: |
          python - <<'PY'
          import json
          import pathlib

          metadata_dir = pathlib.Path("build/release-metadata")
          entries = []
          for path in sorted(metadata_dir.glob("*.json")):
              entries.append(json.loads(path.read_text(encoding="utf-8")))

          if not entries:
              raise SystemExit("No release metadata found")

          matrix_path = pathlib.Path("build/update_release_matrix.json")
          matrix_path.write_text(
              json.dumps(
                  {
                      "schemaVersion": 1,
                      "entries": entries,
                  },
                  ensure_ascii=False,
                  indent=2,
              ) + "\n",
              encoding="utf-8",
          )
          print(matrix_path.read_text(encoding="utf-8"))
          PY

      - name: Generate update manifest
        run: |
          python tool/generate_update_manifest.py \
            --input build/update_release_matrix.json \
            --output releases/update-manifest.json

      - name: Validate generated manifest
        run: python -m json.tool releases/update-manifest.json > /dev/null

      - name: Commit manifest to default branch
        run: |
          if git diff --quiet -- releases/update-manifest.json; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases/update-manifest.json
          git commit -m "chore: sync update manifest"
          git push origin "HEAD:${DEFAULT_BRANCH}"
